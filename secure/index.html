<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ✅ SECURITY HEADERS -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self';
                   style-src 'self' 'unsafe-inline';
                   img-src 'self' data: https:;
                   font-src 'self';
                   connect-src 'self'">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    
    <title>Toko Online - SECURE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🛍️ Toko Online Kami (Aman)</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#products">Produk</a>
            <a href="#contact">Kontak</a>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>Selamat Datang</h2>
            <p id="welcome-message">Loading...</p>
        </section>

        <section id="products">
            <h2>Produk Kami</h2>
            <div id="product-list"></div>
        </section>

        <section id="comments">
            <h2>Komentar Pengunjung</h2>
            <div id="comments-container"></div>
            <input type="text" id="comment-input" placeholder="Tulis komentar..." maxlength="500">
            <button onclick="addComment()">Kirim</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Toko Online Kami - Versi Aman</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
